services:
# Ce service exécute SQL Server et expose le port 1433 pour les connexions externes
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Str0ng!Passw0rd123
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Str0ng!Passw0rd123' -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  # Ce service exécute init.sql une fois que sqlserver est OK pour initialiser notre BDD FormationDB
  sqlserver-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./db/init.sql:/init.sql:ro
    command: >
      bash -lc "
      echo 'Applying init.sql...' &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P 'Str0ng!Passw0rd123' -C -i /init.sql &&
      echo 'init.sql applied'
      "
    restart: "no"

  python-api:
    build:
      context: ./python-api
    container_name: python-api
    environment:
      DB_HOST: "sqlserver"
      DB_PORT: "1433"
      DB_USER: "sa"
      DB_PASSWORD: "Str0ng!Passw0rd123"
      DB_NAME: "FormationDB"
    ports:
      - "8000:8000"
    depends_on:
      sqlserver:
        condition: service_healthy


  dotnet-api:
    build:
      context: ./dotnet-api
    container_name: dotnet-api
    environment:
      ConnectionStrings__Default: 
        "Server=sqlserver,1433;
        Database=FormationDB;
        User Id=sa;
        Password=Str0ng!Passw0rd123;
        TrustServerCertificate=True;"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver_data:
